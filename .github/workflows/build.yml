name: Build WASM Plugins

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install TinyGo
        run: |
          wget -q https://github.com/tinygo-org/tinygo/releases/download/v0.41.1/tinygo_0.41.1_amd64.deb
          sudo dpkg -i tinygo_0.41.1_amd64.deb

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Build all plugins
        run: make all

      - name: Summary
        run: |
          echo "## Plugin Binaries" >> $GITHUB_STEP_SUMMARY
          echo "| Plugin | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          for f in dist/*.wasm; do
            name=$(basename $f)
            size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
            echo "| $name | $((size / 1024))KB |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Commit dist/ if changed
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --cached --quiet && echo "No changes" || (git commit -m "Rebuild WASM binaries [skip ci]" && git push)
